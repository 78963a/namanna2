<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="나만나20260406" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/emoji/192/000000/alarm-clock.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('service-worker.js').then((registration) => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
            
            // 이미 대기 중인 서비스 워커가 있는지 확인
            if (registration.waiting) {
              window.dispatchEvent(new CustomEvent('swUpdateAvailable', { detail: registration }));
            }

            // 새로운 서비스 워커가 발견되었을 때
            registration.onupdatefound = () => {
              const installingWorker = registration.installing;
              if (installingWorker) {
                installingWorker.onstatechange = () => {
                  if (installingWorker.state === 'installed') {
                    if (navigator.serviceWorker.controller) {
                      // 새로운 업데이트가 설치되었음을 알림
                      window.dispatchEvent(new CustomEvent('swUpdateAvailable', { detail: registration }));
                    }
                  }
                };
              }
            };
          }).catch((err) => {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
        
        // 서비스 워커가 업데이트되면 페이지를 자동으로 새로고침하여 최신 상태를 유지하게 합니다.
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            window.location.reload();
            refreshing = true;
          }
        });
      }
    </script>
  </body>
</html>
