name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 최신 버전으로 업데이트

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Upload artifact
        # 🌟 핵심: 조립된 결과물(dist 폴더)을 깃허브 페이지로 보낼 준비를 합니다.
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy
        uses: actions/deploy-pages@v4
